name: mysportsbuddies
description: "MySportsBuddies Flutter App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  image_picker: ^1.1.2
  image_cropper: ^12.0.0
  photo_view: ^0.15.0
  permission_handler: ^12.0.0
  provider: ^6.1.2
  cupertino_icons: ^1.0.9
  country_picker: ^2.0.24

  # Firebase — add google-services.json (Android) & GoogleService-Info.plist (iOS)
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0
  firebase_storage: ^13.0.0

  # HTTP for address autocomplete (Nominatim / OpenStreetMap — free, no API key)
  http: ^1.2.2

  # Persist device user ID across sessions
  shared_preferences: ^2.5.5

  # GPS / location
  geolocator: ^14.0.0

  # Phone / URL launching
  url_launcher: ^6.3.1

  # Google Sign-In (Android: add SHA-1 to Firebase Console; iOS: already via GoogleService-Info.plist)
  google_sign_in: ^7.0.0

  # PDF generation and printing
  pdf: ^3.12.0
  printing: ^5.14.3

  # Google Fonts — Work Sans brand typeface
  google_fonts: ^8.0.0
  win32: 6.0.1

  # Tournament sharing & deep links
  share_plus: ^4.5.3
  app_links: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/1.jpg
    - assets/2.jpg
    - assets/sports/cricket.jpg
    - assets/sports/football.jpg
    - assets/sports/basketball.jpg
    - assets/sports/badminton.jpg
    - assets/sports/tennis.jpg
    - assets/sports/volleyball.jpg
    - assets/sports/chess.jpg



