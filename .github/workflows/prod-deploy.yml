name: Production - Build & Release

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  approval-gate:
    name: Production Approval
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Approval confirmed
        run: echo "Production deployment approved"

  build-production-android:
    name: Build Production Android
    needs: approval-gate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.x'
          channel: stable
          cache: true

      - name: Get version from pubspec
        id: version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | sed 's/version: //')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Build release APK
        run: flutter build apk --release

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Upload Production APK
        uses: actions/upload-artifact@v4
        with:
          name: production-apk-${{ steps.version.outputs.version }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90

      - name: Upload Production AAB
        uses: actions/upload-artifact@v4
        with:
          name: production-aab-${{ steps.version.outputs.version }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 90

  build-production-ios:
    name: Build Production iOS
    needs: approval-gate
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # ── Signed IPA (requires secrets to be configured in GitHub) ──────────
      # Required secrets:
      #   IOS_CERTIFICATE_P12     — base64-encoded Distribution .p12 file
      #   IOS_CERTIFICATE_PASSWORD — password for the .p12
      #   IOS_PROVISIONING_PROFILE — base64-encoded App Store .mobileprovision
      #   APP_STORE_CONNECT_KEY_ID        — App Store Connect API key ID
      #   APP_STORE_CONNECT_ISSUER_ID     — App Store Connect issuer ID
      #   APP_STORE_CONNECT_PRIVATE_KEY   — App Store Connect API private key (.p8 contents)
      - name: Import signing certificate
        if: ${{ env.IOS_CERTIFICATE_P12 != '' }}
        env:
          IOS_CERTIFICATE_P12: ${{ secrets.IOS_CERTIFICATE_P12 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          echo "$IOS_CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -P "$IOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install provisioning profile
        if: ${{ env.IOS_PROVISIONING_PROFILE != '' }}
        env:
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo "$IOS_PROVISIONING_PROFILE" | base64 --decode > $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build IPA
        if: ${{ env.IOS_CERTIFICATE_P12 != '' }}
        env:
          IOS_CERTIFICATE_P12: ${{ secrets.IOS_CERTIFICATE_P12 }}
        run: |
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist

      - name: Upload IPA to App Store Connect
        if: ${{ env.APP_STORE_CONNECT_KEY_ID != '' }}
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > $RUNNER_TEMP/AuthKey.p8
          xcrun altool --upload-app \
            --type ios \
            --file "build/ios/ipa/mysportsbuddies.ipa" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --privateKey "$RUNNER_TEMP/AuthKey.p8"

      - name: Build iOS (no codesign — fallback when secrets not configured)
        if: ${{ env.IOS_CERTIFICATE_P12 == '' }}
        env:
          IOS_CERTIFICATE_P12: ${{ secrets.IOS_CERTIFICATE_P12 }}
        run: flutter build ios --no-codesign

      - name: Upload IPA artifact
        if: ${{ env.IOS_CERTIFICATE_P12 != '' }}
        env:
          IOS_CERTIFICATE_P12: ${{ secrets.IOS_CERTIFICATE_P12 }}
        uses: actions/upload-artifact@v4
        with:
          name: production-ipa-${{ needs.build-production-android.outputs.version }}
          path: build/ios/ipa/*.ipa
          retention-days: 90

  create-release:
    name: Create GitHub Release
    needs: [build-production-android, build-production-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: production-apk-${{ needs.build-production-android.outputs.version }}
          path: release-artifacts/

      - name: Download Android AAB
        uses: actions/download-artifact@v4
        with:
          name: production-aab-${{ needs.build-production-android.outputs.version }}
          path: release-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build-production-android.outputs.version }}-${{ github.run_number }}
          name: Release v${{ needs.build-production-android.outputs.version }} (Build ${{ github.run_number }})
          generate_release_notes: true
          files: release-artifacts/*

