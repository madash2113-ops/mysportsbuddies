name: Production - Build & Release

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  approval-gate:
    name: Production Approval
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Approval confirmed
        run: echo "Production deployment approved"

  build-production-android:
    name: Build Production Android
    needs: approval-gate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.x'
          channel: stable
          cache: true

      - name: Get version from pubspec
        id: version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | sed 's/version: //')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Build release APK
        run: flutter build apk --release

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Upload Production APK
        uses: actions/upload-artifact@v4
        with:
          name: production-apk-${{ steps.version.outputs.version }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90

      - name: Upload Production AAB
        uses: actions/upload-artifact@v4
        with:
          name: production-aab-${{ steps.version.outputs.version }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 90

  build-production-ios:
    name: Build Production iOS
    needs: approval-gate
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --no-codesign

      # TODO: When signing is configured, use:
      # - name: Build iOS IPA
      #   run: flutter build ipa --release

  create-release:
    name: Create GitHub Release
    needs: [build-production-android, build-production-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: production-apk-${{ needs.build-production-android.outputs.version }}
          path: release-artifacts/

      - name: Download Android AAB
        uses: actions/download-artifact@v4
        with:
          name: production-aab-${{ needs.build-production-android.outputs.version }}
          path: release-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build-production-android.outputs.version }}-${{ github.run_number }}
          name: Release v${{ needs.build-production-android.outputs.version }} (Build ${{ github.run_number }})
          generate_release_notes: true
          files: release-artifacts/*

  # TODO: Uncomment when Play Store service account is configured
