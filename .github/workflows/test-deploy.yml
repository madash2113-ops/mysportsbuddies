name: Staging - Build & Deploy

on:
  push:
    branches: [test]

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  build-staging-android:
    name: Build Staging Android
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Build release APK
        run: flutter build apk --release

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Upload Staging APK
        uses: actions/upload-artifact@v4
        with:
          name: staging-apk-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload Staging AAB
        uses: actions/upload-artifact@v4
        with:
          name: staging-aab-${{ github.run_number }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      # TODO: Add Firebase App Distribution step when ready
      # - name: Distribute via Firebase
      #   uses: wzieba/Firebase-Distribution-Github-Action@v1
      #   with:
      #     appId: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
      #     serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      #     groups: qa-testers
      #     file: build/app/outputs/flutter-apk/app-release.apk

  build-staging-ios:
    name: Build Staging iOS
    runs-on: macos-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --no-codesign
