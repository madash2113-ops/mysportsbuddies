<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <title>MySportsBuddies</title>
  <link rel="icon" type="image/png" href="favicon.png"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      transition: opacity 0.4s ease;
    }

    #splash.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    /* Outer ambient glow ring */
    .glow-ring {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(204,31,31,0.18) 0%, transparent 70%);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: breathe 2.4s ease-in-out infinite;
      margin-bottom: 36px;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1);   opacity: 1; }
      50%       { transform: scale(1.1); opacity: 0.7; }
    }

    /* Red circle with trophy */
    .logo-circle {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #e83030, #c01f1f);
      box-shadow:
        0 0 0 8px rgba(204,31,31,0.15),
        0 0 40px rgba(204,31,31,0.45),
        0 0 80px rgba(204,31,31,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Trophy SVG */
    .trophy {
      width: 52px;
      height: 52px;
      fill: #ffffff;
    }

    /* Brand text */
    .brand {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 10px;
    }
    .brand .white { color: #FFFFFF; }
    .brand .red   { color: #FB3640; }

    /* Tagline */
    .tagline {
      font-size: 14px;
      color: #555;
      letter-spacing: 0.5px;
      margin-bottom: 48px;
    }

    /* Loading dots */
    .dots {
      display: flex;
      gap: 8px;
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #FB3640;
      animation: dot-pulse 1.4s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; background: #cc1a22; }
    .dot:nth-child(3) { animation-delay: 0.4s; background: #8b0000; }

    @keyframes dot-pulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.35; }
      40%            { transform: scale(1);   opacity: 1; }
    }

    /* Flutter canvas — hidden behind splash initially */
    flt-glass-pane, flutter-view {
      position: fixed !important;
      inset: 0 !important;
    }
  </style>
</head>
<body>
  <div id="splash">
    <div class="glow-ring">
      <div class="logo-circle">
        <!-- Trophy icon -->
        <svg class="trophy" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M19 5h-2V3H7v2H5C3.9 5 3 5.9 3 7v1c0 2.55 1.92 4.63 4.39 4.94A5.01 5.01 0 0 0 11 15.9V18H9v2h6v-2h-2v-2.1a5.01 5.01 0 0 0 3.61-2.96C19.08 12.63 21 10.55 21 8V7c0-1.1-.9-2-2-2zm-2 3.8V7h2v1c0 1.29-.8 2.4-2 2.8zM5 8V7h2v1.8C5.8 10.4 5 9.29 5 8zm7 6c-1.65 0-3-1.35-3-3V5h6v6c0 1.65-1.35 3-3 3z"/>
        </svg>
      </div>
    </div>

    <div class="brand">
      <span class="white">MySports</span><span class="red">Buddies</span>
    </div>
    <div class="tagline">Find. Play. Connect.</div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <script>
    // Hide splash once Flutter is ready
    window.addEventListener('flutter-first-frame', function() {
      const splash = document.getElementById('splash');
      splash.classList.add('fade-out');
      setTimeout(function() { splash.style.display = 'none'; }, 400);
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
